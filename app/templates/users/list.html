{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block heading %}<i class="bi bi-person-gear me-2"></i>Users{% endblock %}
{% block content %}
<div class="row g-3">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-header bg-white fw-semibold">Accounts</div>
      <div class="card-body p-0">
        <table class="table align-middle mb-0">
          <thead><tr><th class="ps-3">Username</th><th>Name</th><th>Role</th><th>Active</th><th></th></tr></thead>
          <tbody>
          {% for u in rows %}
            <form id="u{{ u.id }}" action="/users/{{ u.id }}/update" method="post"></form>
            <tr>
              <td class="ps-3 fw-semibold">{{ u.username }}</td>
              <td><input form="u{{ u.id }}" name="full_name" class="form-control form-control-sm" value="{{ u.full_name }}"></td>
              <td>
                <select form="u{{ u.id }}" name="role" class="form-select form-select-sm">
                  {% for r in roles %}<option value="{{ r }}" {{ 'selected' if u.role == r else '' }}>{{ r }}</option>{% endfor %}
                </select>
              </td>
              <td><input form="u{{ u.id }}" type="checkbox" name="active" class="form-check-input" {{ 'checked' if u.active else '' }}></td>
              <td class="text-end pe-3">
                <input form="u{{ u.id }}" name="password" type="password" class="form-control form-control-sm d-inline-block" style="width:130px" placeholder="reset password">
                <button form="u{{ u.id }}" class="btn btn-sm btn-outline-primary"><i class="bi bi-check-lg"></i></button>
                <form action="/users/{{ u.id }}/delete" method="post" class="d-inline" onsubmit="return confirm('Delete {{ u.username }}?')">
                  <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                </form>
              </td>
            </tr>
          {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="card shadow-sm">
      <div class="card-header bg-white fw-semibold">Add user</div>
      <div class="card-body">
        <form action="/users/new" method="post">
          <div class="mb-2"><label class="form-label small">Username</label>
            <input name="username" class="form-control form-control-sm" required></div>
          <div class="mb-2"><label class="form-label small">Full name</label>
            <input name="full_name" class="form-control form-control-sm"></div>
          <div class="row g-2">
            <div class="col-6"><label class="form-label small">Role</label>
              <select name="role" class="form-select form-select-sm">{% for r in roles %}<option>{{ r }}</option>{% endfor %}</select></div>
            <div class="col-6"><label class="form-label small">Password</label>
              <input type="password" name="password" class="form-control form-control-sm" required></div>
          </div>
          <button class="btn btn-primary btn-sm w-100 mt-3"><i class="bi bi-person-plus me-1"></i>Create user</button>
        </form>
        <p class="text-muted small mt-3 mb-0"><b>admin</b> can manage users &amp; settings; <b>staff</b> can use everything else.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
