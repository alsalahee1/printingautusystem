{% extends "base.html" %}
{% block title %}New Delivery Order{% endblock %}
{% block heading %}<i class="bi bi-box-arrow-right me-2"></i>New Delivery Order{% endblock %}
{% block content %}
<form method="post" action="/delivery-orders/new" class="card shadow-sm">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-6 required">
        <label class="form-label">Customer</label>
        <select name="customer_id" class="form-select" required>
          <option value="">— select customer —</option>
          {% for c in customers %}<option value="{{ c.id }}">{{ c.code }} — {{ c.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control" value="{{ today }}">
      </div>
      <div class="col-12">
        <label class="form-label">Delivered to (address)</label>
        <textarea name="delivered_to" class="form-control" rows="2"></textarea>
      </div>
      <div class="col-12">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
      </div>
    </div>
  </div>
  <div class="card-footer d-flex justify-content-between">
    <a href="/delivery-orders" class="btn btn-outline-secondary">Cancel</a>
    <button class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Create &amp; Add Items</button>
  </div>
</form>
{% endblock %}
