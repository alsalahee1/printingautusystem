<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · PrintSys</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #1f2937; min-height: 100vh; display: flex; align-items: center; }
    .login-card { max-width: 380px; width: 100%; margin: auto; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center text-white mb-3">
    <i class="bi bi-printer-fill fs-1"></i>
    <h3 class="fw-bold mb-0">PrintSys</h3>
    <div class="text-secondary small">Offset Printing Management</div>
  </div>
  <div class="card shadow">
    <div class="card-body p-4">
      {% if error %}<div class="alert alert-danger py-2">{{ error }}</div>{% endif %}
      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input name="username" class="form-control" value="{{ username or '' }}" autofocus required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i>Sign in</button>
      </form>
    </div>
  </div>
  <p class="text-center text-secondary small mt-3">Default login: <code>admin</code> / <code>admin</code> — change it after first sign-in.</p>
</div>
</body>
</html>
