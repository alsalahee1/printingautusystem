{% extends "base.html" %}
{% block title %}New Bill{% endblock %}
{% block heading %}<i class="bi bi-file-earmark-ruled me-2"></i>New Supplier Bill{% endblock %}
{% block content %}
<form method="post" action="/bills/new" class="card shadow-sm">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-6 required">
        <label class="form-label">Supplier</label>
        <select name="supplier_id" class="form-select" required>
          <option value="">— select supplier —</option>
          {% for s in suppliers %}<option value="{{ s.id }}">{{ s.code }} — {{ s.name }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Supplier's invoice no.</label>
        <input name="supplier_ref" class="form-control">
      </div>
      <div class="col-md-3">
        <label class="form-label">Tax %</label>
        <input type="number" step="any" name="tax_pct" class="form-control" value="{{ settings.tax_pct }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Bill date</label>
        <input type="date" name="date" class="form-control" value="{{ today }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Due date</label>
        <input type="date" name="due_date" class="form-control" value="{{ due_date }}">
      </div>
      <div class="col-12">
        <label class="form-label">Notes</label>
        <textarea name="notes" class="form-control" rows="2"></textarea>
      </div>
    </div>
  </div>
  <div class="card-footer d-flex justify-content-between">
    <a href="/bills" class="btn btn-outline-secondary">Cancel</a>
    <button class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Create &amp; Add Items</button>
  </div>
</form>
{% endblock %}
